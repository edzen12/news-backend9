<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Новостой сайт</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
  </head>
  <body>
    <!-- header -->
    <div class="container">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
        <a href="{% url "home" %}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <img width="50px" src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Python-logo-notext.svg/1280px-Python-logo-notext.svg.png'>
            <h3>Лого</h3>
        </a>

        <ul class="nav nav-pills">
            <li class="nav-item">
                <a href="{% url "home" %}" class="nav-link active" aria-current="page">Главная</a>
            </li>
            {% for category in categories %}
            <li class="nav-item">
                <a href="#" class="nav-link">{{category.name}}</a>
            </li>
            {% endfor %}
        </ul>
        </header>
    </div>
    <!-- header -->

    {% block content %}
    
    {% endblock content %}

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
