{% extends "base.html" %}

{% block content %}

<div class="container">
    <h2>Смена пароля</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        {% if form.errors %}
            <div style="color:red;">
                {{ form.errors }}
            </div>
        {% endif %}
        <button class='btn btn-primary' type="submit">
            Сменить пароль
        </button>
    </form>
</div>

{% endblock content %}
