{% extends "base.html" %}

{% block content %}
    <div class="container">
        <div class="row">
            {% for art in articles %} 
            <div class="col-lg-4">
                <div class="card p-2">
                    <a href='{% url "post_detail" art.slug %}'>
                        <img width="300px" class="img-thumbnail" src="{{art.image.url}}">
                        <h2>{{art.title}}</h2>
                        <p>{{art.description|truncatewords:12}}</p>
                    </a>
                </div>
            </div> 
            {% endfor %}
        </div> 
    </div>
{% endblock content %}
